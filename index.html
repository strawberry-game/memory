<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神経衰弱ゲーム</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --panel:#ffffff;
      --text:#0f172a;
      --sub:#475569;
      --accent:#2563eb;
      --accent2:#60a5fa;
      --success:#16a34a;
      --warn:#dc2626;
      --cardBack1:#334155;
      --cardBack2:#1e293b;
      --line:#dbeafe;
      --shadow:0 10px 25px rgba(15,23,42,0.16);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:#fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .wrap{
      flex:1;
      max-width:1000px;
      margin:0 auto;
      padding:24px 16px 40px;
      width:100%;
    }

    .hero{
      position:relative;
      text-align:center;
      margin-bottom:20px;
      padding:18px 16px;
      border-radius:20px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.14);
      box-shadow:0 10px 25px rgba(0,0,0,0.18);
      overflow:hidden;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      padding:1.5px;
      border-radius:20px;
      background:linear-gradient(135deg, rgba(96,165,250,0.95), rgba(255,255,255,0.7), rgba(37,99,235,0.95));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .hero h1{
      position:relative;
      z-index:1;
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
      letter-spacing:0.04em;
    }

    .hero p{
      position:relative;
      z-index:1;
      margin:0;
      color:#dbeafe;
      line-height:1.8;
    }

    .panel{
      background:var(--panel);
      color:var(--text);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:12px;
      align-items:end;
      margin-bottom:18px;
    }

    .field label{
      display:block;
      font-size:13px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }

    select, button{
      font:inherit;
    }

    select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      background:#fff;
      color:var(--text);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:700;
      transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
      box-shadow:0 6px 14px rgba(37,99,235,0.18);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn:active{
      transform:translateY(0);
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .btn-secondary{
      background:#e2e8f0;
      color:#0f172a;
      box-shadow:none;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:16px;
      padding:14px;
      text-align:center;
    }

    .stat-label{
      color:var(--sub);
      font-size:12px;
      margin-bottom:6px;
      font-weight:700;
    }

    .stat-value{
      font-size:24px;
      font-weight:800;
      color:#0f172a;
    }

    .message{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:14px;
      background:#eff6ff;
      color:#1e3a8a;
      border:1px solid #bfdbfe;
      line-height:1.7;
      min-height:54px;
    }

    .board{
      display:grid;
      gap:10px;
    }

    .board.size-16{
      grid-template-columns:repeat(4,1fr);
    }

    .board.size-20{
      grid-template-columns:repeat(5,1fr);
    }

    .board.size-24{
      grid-template-columns:repeat(6,1fr);
    }

    .card{
      position:relative;
      width:100%;
      aspect-ratio:3/4;
      perspective:1000px;
      border:none;
      background:none;
      padding:0;
      cursor:pointer;
    }

    .card:disabled{
      cursor:default;
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transition:transform .45s ease;
      transform-style:preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner{
      transform:rotateY(180deg);
    }

    .card-face{
      position:absolute;
      inset:0;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      user-select:none;
    }

    .card-back{
      background:linear-gradient(145deg,var(--cardBack1),var(--cardBack2));
      color:#e2e8f0;
      border:2px solid rgba(255,255,255,0.08);
      font-size:28px;
      font-weight:800;
      box-shadow:0 8px 18px rgba(15,23,42,0.2);
    }

    .card-front{
      transform:rotateY(180deg);
      background:linear-gradient(145deg,#ffffff,#eff6ff);
      color:#0f172a;
      border:2px solid #bfdbfe;
      box-shadow:0 8px 18px rgba(15,23,42,0.12);
      font-size:clamp(28px,4vw,42px);
    }

    .card.matched .card-front{
      border-color:#86efac;
      background:linear-gradient(145deg,#f0fdf4,#dcfce7);
      animation:matchGlow .45s ease;
    }

    @keyframes matchGlow{
      0%{ transform:rotateY(180deg) scale(1); }
      50%{ transform:rotateY(180deg) scale(1.04); }
      100%{ transform:rotateY(180deg) scale(1); }
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    .overlay.show{
      display:flex;
    }

    .modal{
      width:min(520px,100%);
      background:#fff;
      color:#0f172a;
      border-radius:22px;
      padding:24px;
      box-shadow:0 24px 60px rgba(15,23,42,0.35);
      text-align:center;
    }

    .modal h2{
      margin:0 0 10px;
      font-size:30px;
    }

    .modal p{
      margin:8px 0;
      color:#334155;
      line-height:1.8;
    }

    .modal-actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    footer{
      text-align:center;
      padding:16px;
      font-size:12px;
      background:#020617;
      color:#94a3b8;
    }

    @media (max-width: 820px){
      .controls{
        grid-template-columns:1fr 1fr;
      }
      .controls .field{
        grid-column:1 / -1;
      }
      .stats{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width: 640px){
      .wrap{
        padding:18px 12px 28px;
      }
      .panel{
        padding:14px;
        border-radius:18px;
      }
      .board.size-20{
        grid-template-columns:repeat(4,1fr);
      }
      .board.size-24{
        grid-template-columns:repeat(4,1fr);
      }
      .card-front{
        font-size:32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>神経衰弱ゲーム</h1>
      <p>2枚ずつカードをめくって、同じ絵柄をそろえてください。<br>時間を見ながら、すべてのペア完成を目指します。</p>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="field">
          <label for="difficulty">難易度</label>
          <select id="difficulty">
            <option value="16">かんたん（4×4 / 8ペア）</option>
            <option value="20">ふつう（4×5 / 10ペア）</option>
            <option value="24">むずかしい（4×6 / 12ペア）</option>
          </select>
        </div>
        <button id="startBtn" class="btn btn-primary">新しくはじめる</button>
        <button id="resetBestBtn" class="btn btn-secondary">ベスト記録を消去</button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">手数</div>
          <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">経過時間</div>
          <div class="stat-value" id="time">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">そろった数</div>
          <div class="stat-value" id="pairs">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">ベスト手数</div>
          <div class="stat-value" id="best">-</div>
        </div>
      </div>

      <div class="message" id="message">「新しくはじめる」を押すとゲームを開始できます。</div>

      <div id="board" class="board size-16"></div>
    </div>
  </div>

  <div id="clearOverlay" class="overlay">
    <div class="modal">
      <h2>クリアです！</h2>
      <p id="clearSummary"></p>
      <p id="clearBestMessage"></p>
      <div class="modal-actions">
        <button id="playAgainBtn" class="btn btn-primary">もう一度遊ぶ</button>
        <button id="closeModalBtn" class="btn btn-secondary">閉じる</button>
      </div>
    </div>
  </div>

  <footer>
    © 2026 STRAWBERRY ALL RIGHTS RESERVED.
  </footer>

  <script>
    const SYMBOLS = ['🍎','🍊','🍋','🍇','🍉','🍓','🍒','🥝','🍍','🥥','🍑','🍌'];
    const FLIP_BACK_DELAY = 850;

    let difficulty = 16;
    let boardSymbols = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;
    let totalPairs = 0;
    let timer = null;
    let elapsed = 0;
    let gameStarted = false;

    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const timeEl = document.getElementById('time');
    const pairsEl = document.getElementById('pairs');
    const bestEl = document.getElementById('best');
    const messageEl = document.getElementById('message');
    const difficultyEl = document.getElementById('difficulty');
    const clearOverlayEl = document.getElementById('clearOverlay');
    const clearSummaryEl = document.getElementById('clearSummary');
    const clearBestMessageEl = document.getElementById('clearBestMessage');

    document.getElementById('startBtn').addEventListener('click', setupGame);
    document.getElementById('playAgainBtn').addEventListener('click', function() {
      clearOverlayEl.classList.remove('show');
      setupGame();
    });
    document.getElementById('closeModalBtn').addEventListener('click', function() {
      clearOverlayEl.classList.remove('show');
    });
    document.getElementById('resetBestBtn').addEventListener('click', resetBestScore);
    difficultyEl.addEventListener('change', function() {
      difficulty = Number(this.value);
      updateBestScoreDisplay();
    });

    function setupGame() {
      difficulty = Number(difficultyEl.value);
      totalPairs = difficulty / 2;
      moves = 0;
      matchedPairs = 0;
      elapsed = 0;
      gameStarted = false;
      firstCard = null;
      secondCard = null;
      lockBoard = false;

      stopTimer();
      updateStats();

      boardEl.innerHTML = '';
      boardEl.className = 'board size-' + difficulty;

      const selected = SYMBOLS.slice(0, totalPairs);
      boardSymbols = shuffle([...selected, ...selected]);

      boardSymbols.forEach(function(symbol, index) {
        const card = document.createElement('button');
        card.className = 'card';
        card.type = 'button';
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back">?</div>
            <div class="card-face card-front">${symbol}</div>
          </div>
        `;
        card.addEventListener('click', onCardClick);
        boardEl.appendChild(card);
      });

      updateBestScoreDisplay();
      setMessage('ゲームを開始しました。2枚めくって同じ絵柄を探してください。');
    }

    function onCardClick(event) {
      const card = event.currentTarget;

      if (lockBoard) return;
      if (card === firstCard) return;
      if (card.classList.contains('matched')) return;
      if (card.classList.contains('flipped')) return;

      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      flipCard(card);

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkForMatch();
    }

    function flipCard(card) {
      card.classList.add('flipped');
    }

    function unflipCards() {
      lockBoard = true;
      setMessage('ちがうカードでした。もう一度覚えて挑戦してみましょう。');

      setTimeout(function() {
        if (firstCard) firstCard.classList.remove('flipped');
        if (secondCard) secondCard.classList.remove('flipped');
        resetTurn();
      }, FLIP_BACK_DELAY);
    }

    function checkForMatch() {
      if (!firstCard || !secondCard) return;

      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        firstCard.disabled = true;
        secondCard.disabled = true;
        matchedPairs++;
        updateStats();

        if (matchedPairs === totalPairs) {
          finishGame();
        } else {
          setMessage('そろいました。いい調子です。');
        }
        resetTurn();
      } else {
        unflipCards();
      }
    }

    function resetTurn() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }

    function updateStats() {
      movesEl.textContent = moves;
      timeEl.textContent = elapsed;
      pairsEl.textContent = matchedPairs + ' / ' + totalPairs;
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(function() {
        elapsed++;
        timeEl.textContent = elapsed;
      }, 1000);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function finishGame() {
      stopTimer();
      lockBoard = true;

      const key = getBestScoreKey();
      const currentBest = Number(localStorage.getItem(key) || 0);
      let isNewBest = false;

      if (!currentBest || moves < currentBest) {
        localStorage.setItem(key, String(moves));
        isNewBest = true;
      }

      updateBestScoreDisplay();
      setMessage('すべてのカードがそろいました。クリアです。');

      clearSummaryEl.textContent = '手数は ' + moves + ' 回、経過時間は ' + elapsed + ' 秒でした。';
      clearBestMessageEl.textContent = isNewBest
        ? '新しいベスト記録です。お見事です。'
        : '今回もクリアです。さらに少ない手数も目指せます。';

      clearOverlayEl.classList.add('show');
    }

    function getBestScoreKey() {
      return 'memory_best_' + difficulty;
    }

    function updateBestScoreDisplay() {
      const best = localStorage.getItem(getBestScoreKey());
      bestEl.textContent = best ? best : '-';
    }

    function resetBestScore() {
      ['16','20','24'].forEach(function(size) {
        localStorage.removeItem('memory_best_' + size);
      });
      updateBestScoreDisplay();
      setMessage('ベスト記録を消去しました。');
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    setupGame();
  </script>
</body>
</html>
